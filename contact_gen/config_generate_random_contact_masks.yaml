hparams_path: contact_gen/contact_sampler_hparams.yaml
real_masks_path: contact_gen/contact_points_validate.pt

robot_names:
  - allegro
  - barrett
  - ezgripper
  - robotiq_3finger
  - shadowhand

device: cpu
seed: 42

threshold: 0.4
align_exp_scale: 2.0
sigmoid_scale: 10.0

sample_count: 10000
# `per_robot`: each robot gets `sample_count` samples.
# `total`: `sample_count` is split across all robots.
sample_count_mode: per_robot
sample_chunk: 1000
patch_points: 96
save_visualization_samples: 200

# Use component range inferred in hparams yaml when value is -1.
component_min: -1
component_max: -1
check_template_hash: true

# Anchor sampling controls.
anchor_temperature: 1.0
# `point_prob`: sample anchor indices from real-mask occupancy prior.
# `uniform`: sample anchor indices uniformly on surface points (ignores point_prob).
anchor_sampling_mode: point_prob

# Virtual object patch sampling.
patch_anchor_shift_min: 0.0002
patch_anchor_shift_max: 0.0030
patch_extent_min: 0.006
patch_extent_max: 0.050
patch_extent_power: 1.0
patch_shift_power: 1.0
patch_points_per_anchor_min: 28
patch_points_per_anchor_max: 84
patch_penetration_clearance: 0.00008

# Mask count adjustment.
patch_exact_count_prob: 1.0
patch_count_clamp_ratio: 0.3

output_dir: contact_gen/generated_masks

hydra:
  run:
    dir: .
  output_subdir: null
