defaults:
  - _self_

seed: 42

env:
  repr_python: /home/qianxu/miniconda3/envs/repr/bin/python
  sim_python: /home/qianxu/Project/spider/.venv/bin/python

splits:
  - train
  - validate

policies:
  cross:
    enabled: true
    label: cross_embodiment
    ckpt_path: ./checkpoints/baselines/cross_embodiment_cvae/best.pt
    dataset_meta_path: null
  single:
    enabled: true
    label_prefix: single_
    checkpoint_root: ./checkpoints/baselines/single_embodiment_cvae
    checkpoint_name: best.pt
    dataset_meta_name: dataset_meta.pt
    robot_names:
      - allegro
      - barrett
      - ezgripper
      - shadowhand

validate:
  common_overrides:
    - validation.test_rounds=2
    - validation.pred_mode=sample
    - validation.recon_use_mean_latent=true
    - validation.compute_chamfer=true

sim:
  common_overrides:
    - input.max_total_samples=-1
    - input.max_samples_per_robot=-1
    - input.shuffle=false
    - mujoco.backend=mjwarp
    - mujoco.device=cuda:0
    - mujoco.capture_cuda_graph=true

outputs:
  root_dir: ./outputs/cvae_baselines/comparison
  manifest_path: ./outputs/cvae_baselines/comparison/manifest.json
  report_md: ./outputs/cvae_baselines/comparison/report.md
  report_json: ./outputs/cvae_baselines/comparison/report.json

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_run_cvae_pipeline
  job:
    chdir: false
