defaults:
  - _self_

seed: 42

experiment:
  name: contact_diffusion_policy

dataset:
  robot_names:
    - allegro
    - barrett
    - ezgripper
    - robotiq_3finger
    - shadowhand
  hparams_path: ./contact_gen/contact_sampler_hparams.yaml
  real_masks_path: ./contact_gen/contact_points_validate.pt
  train_generation_device: cuda
  robot_model_device: cuda
  real_val_build_device: cuda
  check_template_hash: true
  train_samples_per_epoch: 1000000
  synthetic_val_samples_per_epoch: 1024
  buffer_refresh_fraction: 0.1
  buffer_build_batch_size_per_robot: 1024
  buffer_refresh_batch_size_per_robot: 1024
  batch_size: 512
  val_batch_size: 512
  num_workers: 22
  prefetch_factor: 2
  pin_memory: true
  drop_last: true
  cache_validation_samples: true
  real_val_cache_build_batch_size: 256
  max_contact_points: 256
  threshold: 0.4
  align_exp_scale: 2.0
  sigmoid_scale: 10.0
  component_sampling_mode: distribution
  anchor_sampling_mode: point_prob
  anchor_temperature: 1.0
  patch_anchor_shift_min: 0.0002
  patch_anchor_shift_max: 0.0030
  patch_extent_min: 0.006
  patch_extent_max: 0.050
  patch_extent_power: 1.0
  patch_shift_power: 1.0
  patch_normal_jitter_max_deg: 10.0
  patch_points_per_anchor_min: 28
  patch_points_per_anchor_max: 84
  patch_penetration_clearance: 0.00008

model:
  p_hat_encoder:
    in_channels: 6
    hidden_dim: 128
    out_channels: 128
    num_layers: 4
  contact_encoder:
    in_channels: 6
    hidden_dim: 128
    out_channels: 128
    num_layers: 4
  fusion_hidden_dims: [256]
  global_cond_dim: 256
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  condition_type: film
  num_inference_steps: 10
  noise_scheduler:
    num_train_timesteps: 50
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: false
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: sample

training:
  device: cuda
  epochs: 10000
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6
  lr_scheduler: cosine
  lr_warmup_steps: 500
  grad_clip_norm: 1.0
  use_amp: true
  amp_dtype: bfloat16
  use_ema: true
  ema:
    update_after_step: 0
    inv_gamma: 1.0
    power: 0.75
    min_value: 0.0
    max_value: 0.9999
  log_every_n_steps: 10
  val_subset_size: 2048
  full_val_every_n_epochs: 10
  max_train_batches: -1
  max_val_batches: -1
  save_every_n_epoch: 10
  save_dir: ./checkpoints/contact_diffusion_policy

wandb:
  enabled: true
  project: action_repr
  entity: null
  name: contact-diffusion-policy
  mode: online

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_contact_policy
  job:
    chdir: false
